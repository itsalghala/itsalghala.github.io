<!DOCTYPE html>
<html lang="en">
<head>

<body>
  <div class="container">

      <h2 id="log-title">Loading Intelligence...</h2>

  <script>
    const logs = {
      'reactor': { title: 'Reactor: Prototype Pollution', body: '...' },
      'appointment': { title: 'Appointment: SQLi Bypass', body: '...' }
    };
    const params = new URLSearchParams(window.location.search);
    const m = params.get('machine');
    if(logs[m]) {
      document.getElementById('log-title').innerText = logs[m].title;
    }
  </script>
